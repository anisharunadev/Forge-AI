# OpenAPI 3.1 — FORA Orchestrator + Apps public REST surface

This file is the **machine-readable source of truth** for the platform's public REST surface. Conformance per architecture memory §7 ("REST for the public surface. JSON over HTTPS, OpenAPI 3.1 published from the same source of truth as the validator").

The internal Orchestrator ↔ Agent Runtime seam is gRPC + proto3 (see ADR-0007). This OpenAPI document covers the **public REST surface** that the Forge console, MCP servers, and customer integrations call.

## Conventions

- **Versioning.** URL prefix `/v1/`. Additive changes are unversioned. Breaking changes bump to `/v2/`.
- **Auth.** Bearer JWT from `apps/identity-broker` (OIDC). Audience `forge-runtime` for runtime callers, `forge-console` for the console.
- **Idempotency.** Every mutating call requires `Idempotency-Key: <UUIDv4>`. Same key + same body = replay (cached response, `Replay: true` header). Same key + different body = `409 IDEMPOTENCY_CONFLICT`. See ADR-0004.
- **Pagination.** Cursor-based. `?limit=50&cursor=<opaque>`. The response carries `next_cursor` (nullable) and `total_estimate` (best-effort, may be null on large tenants).
- **Errors.** Envelope is `{ "error": { "code", "message", "request_id", "retry_after_ms" } }`. Codes are stable; messages are not. See `forge/2.3/lld.md` §7 for the code table.
- **Timestamps.** ISO 8601 UTC with `Z` suffix.
- **IDs.** UUIDv7 for time-ordered ids; UUIDv4 otherwise.

## Validation

```bash
# Built-in 3.1 validator (Node.js)
npx @apidevtools/swagger-cli validate forge/2.3/openapi.yaml

# Spectral with the OpenAPI 3.1 ruleset
npx @stoplight/spectral-cli lint forge/2.3/openapi.yaml \
  --ruleset .spectral/openapi-3.1.yaml

# JSON Schema 2020-12 (the 3.1 schema)
npx ajv validate -s openapi-3.1.json -d forge/2.3/openapi.yaml
```

The CI pipeline runs all three on every PR that touches this file.

## openapi.yaml

```yaml
openapi: 3.1.0
info:
  title: FORA Orchestrator + Apps
  version: 0.1.0
  summary: Public REST surface for the FORA agent-of-agents platform.
  description: |
    Source of truth for the v1 REST API. The internal Orchestrator ↔ Agent Runtime
    seam is gRPC + proto3 (see ADR-0007). This document covers the public REST
    surface that the Forge console, MCP servers, and customer integrations call.
  contact:
    name: FORA CTO
    email: cto@fora.example
  license:
    name: Proprietary
    identifier: LicenseRef-fora-internal
  x-review:
    last-reviewed-by: cto
    last-reviewed-at: 2026-06-17
    parent-prd: workspace/project/PRD.md
    parent-issue: FORA-35
servers:
  - url: https://api.fora.example/v1
    description: Production (us-east-1)
  - url: https://api.staging.fora.example/v1
    description: Staging
  - url: http://127.0.0.1:3100/v1
    description: Local Paperclip runtime (developer machine)
tags:
  - name: runs
    description: Agent-run lifecycle (the spine of the platform).
  - name: stages
    description: Per-stage state and artefacts.
  - name: approvals
    description: Human-in-the-loop gates.
  - name: interactions
    description: Pending UI cards for the user / board.
  - name: comments
    description: Threaded conversation on a run or stage.
  - name: agents
    description: Agent registration and identity.
  - name: issues
    description: Work items the Master Orchestrator coordinates.
  - name: cloud-broker
    description: Per-tenant cloud credential federation.
  - name: audit
    description: Audit-log read surface (audit account).
  - name: oauth
    description: OIDC + IdP webhook.
  - name: events
    description: Event-bus bridge (cross-account audit shipping).
  - name: health
    description: Liveness / readiness probes.

security:
  - bearerAuth: []

paths:
  # -----------------------------------------------------------------------
  # Runs
  # -----------------------------------------------------------------------
  /runs:
    post:
      tags: [runs]
      summary: Create a run
      operationId: createRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
            examples:
              slack:
                $ref: '#/components/examples/CreateRunSlack'
      responses:
        '201':
          description: Run created.
          headers:
            Location:
              schema: { type: string, format: uri }
              description: URL of the new run.
            Replay:
              schema: { type: boolean }
              description: True when this is a cached replay of a prior identical request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BudgetExceeded' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
    get:
      tags: [runs]
      summary: List runs (cursor-paginated)
      operationId: listRuns
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/RunStatus' }
        - in: query
          name: current_stage
          schema: { $ref: '#/components/schemas/Stage' }
        - in: query
          name: project_id
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Page of runs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunPage'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [runs]
      summary: Get a run
      operationId: getRun
      responses:
        '200':
          description: Run header.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /runs/{run_id}/context:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [runs]
      summary: Get the run context for a stage (the single seam; gRPC equivalent is Orchestrator.GetRunContext).
      operationId: getRunContext
      parameters:
        - in: query
          name: stage
          required: true
          schema: { $ref: '#/components/schemas/Stage' }
      responses:
        '200':
          description: Run context.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunContext' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /runs/{run_id}/transitions:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [runs]
      summary: Advance (or return / abort) a run to the next stage
      operationId: transitionRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionRequest' }
      responses:
        '200':
          description: Stage decision.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StageDecision' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BudgetExceeded' }
        '409':
          description: Stage mismatch or idempotency conflict.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalError' }

  /runs/{run_id}/stages:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [stages]
      summary: List all seven stages for a run
      operationId: listStages
      responses:
        '200':
          description: All stages.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RunStage' }
        '404': { $ref: '#/components/responses/NotFound' }

  /runs/{run_id}/cost:
    parameters:
      - $ref: '#/components/parameters/RunId'
    post:
      tags: [runs]
      summary: Report tokens + USD spent in the current stage (idempotent)
      operationId: reportCost
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CostReport' }
      responses:
        '202':
          description: Accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ack' }
        '402': { $ref: '#/components/responses/BudgetExceeded' }

  # -----------------------------------------------------------------------
  # Approvals
  # -----------------------------------------------------------------------
  /approvals:
    get:
      tags: [approvals]
      summary: List pending approvals (for the caller's role)
      operationId: listApprovals
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of approvals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPage'

  /approvals/{approval_id}/decisions:
    parameters:
      - in: path
        name: approval_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [approvals]
      summary: Record a human decision on a gate
      operationId: decideApproval
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalDecision' }
      responses:
        '200':
          description: Decision recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        '409':
          description: Stale or superseded approval.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # -----------------------------------------------------------------------
  # Interactions
  # -----------------------------------------------------------------------
  /interactions:
    post:
      tags: [interactions]
      summary: Create a pending interaction (the runtime asks the user/board a question)
      operationId: createInteraction
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInteractionRequest' }
      responses:
        '201':
          description: Interaction created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Interaction' }

  /interactions/{interaction_id}:
    parameters:
      - in: path
        name: interaction_id
        required: true
        schema: { type: string }
    get:
      tags: [interactions]
      summary: Get an interaction
      operationId: getInteraction
      responses:
        '200':
          description: Interaction.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Interaction' }

  # -----------------------------------------------------------------------
  # Comments
  # -----------------------------------------------------------------------
  /runs/{run_id}/comments:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [comments]
      summary: List comments on a run (threaded)
      operationId: listComments
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentPage'
    post:
      tags: [comments]
      summary: Post a comment on a run
      operationId: postComment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateComment' }
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  # -----------------------------------------------------------------------
  # Agents
  # -----------------------------------------------------------------------
  /agents:
    get:
      tags: [agents]
      summary: List registered agents (for this tenant)
      operationId: listAgents
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of agents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPage'
    post:
      tags: [agents]
      summary: Register a new agent
      operationId: registerAgent
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAgent' }
      responses:
        '201':
          description: Agent registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

  /agents/{agent_id}:
    parameters:
      - in: path
        name: agent_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [agents]
      summary: Get an agent
      operationId: getAgent
      responses:
        '200':
          description: Agent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }

  # -----------------------------------------------------------------------
  # Issues (work items the orchestrator coordinates)
  # -----------------------------------------------------------------------
  /issues:
    post:
      tags: [issues]
      summary: Create an issue
      operationId: createIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateIssue' }
      responses:
        '201':
          description: Issue created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }
    get:
      tags: [issues]
      summary: List issues
      operationId: listIssues
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/IssueStatus' }
      responses:
        '200':
          description: Page of issues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuePage'

  /issues/{issue_id}:
    parameters:
      - in: path
        name: issue_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [issues]
      summary: Get an issue
      operationId: getIssue
      responses:
        '200':
          description: Issue.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }
    patch:
      tags: [issues]
      summary: Update an issue (status, fields, blockedBy)
      operationId: updateIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateIssue' }
      responses:
        '200':
          description: Updated issue.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Stale target, lock conflict, or cycle in blockedBy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /issues/{issue_id}/checkout:
    parameters:
      - in: path
        name: issue_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [issues]
      summary: Claim the issue for the caller (idempotent on the same caller)
      operationId: checkoutIssue
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Checkout recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Issue' }
        '409':
          description: Another agent has the checkout.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /issues/{issue_id}/comments:
    parameters:
      - in: path
        name: issue_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [issues]
      summary: Comment on an issue
      operationId: postIssueComment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateComment' }
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comment' }

  /issues/{issue_id}/interactions:
    parameters:
      - in: path
        name: issue_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [issues]
      summary: Create an interaction on an issue (suggest_tasks, ask_user_questions, request_confirmation)
      operationId: createIssueInteraction
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInteractionRequest' }
      responses:
        '201':
          description: Interaction created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Interaction' }

  # -----------------------------------------------------------------------
  # Cloud broker
  # -----------------------------------------------------------------------
  /tenants/{tenant_id}/cloud/assume:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [cloud-broker]
      summary: Assume a short-lived cloud role for this tenant
      operationId: cloudAssume
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssumeRequest' }
      responses:
        '200':
          description: Scoped credentials + handle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssumeResponse' }
        '403':
          description: DENY_LIST_HIT or out-of-allow-list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: CIRCUIT_OPEN for (tenant, provider).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /tenants/{tenant_id}/cloud/release:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [cloud-broker]
      summary: Release a previously-assumed handle (idempotent)
      operationId: cloudRelease
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle_id]
              properties:
                handle_id: { type: string, format: uuid }
      responses:
        '204': { description: Released. }

  /tenants/{tenant_id}/cloud/probe:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [cloud-broker]
      summary: Internal canary probe (system-only; every 5 min)
      operationId: cloudProbe
      responses:
        '200':
          description: Probe result.
          content:
            application/json:
              schema:
                type: object
                required: [provider, ok]
                properties:
                  provider: { type: string, enum: [aws, azure, gcp] }
                  ok: { type: boolean }
                  error: { type: string, nullable: true }
                  latency_ms: { type: integer, nullable: true }

  # -----------------------------------------------------------------------
  # Audit (read surface; lives in the audit account)
  # -----------------------------------------------------------------------
  /tenants/{tenant_id}/audit/runs:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [audit]
      summary: List runs visible to this caller (filterable)
      operationId: auditListRuns
      parameters:
        - in: query
          name: date_from
          schema: { type: string, format: date-time }
        - in: query
          name: date_to
          schema: { type: string, format: date-time }
        - in: query
          name: actor
          schema: { type: string, description: "Match by `agent:%`, `user:%`, or `system:%`" }
        - in: query
          name: tool
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Page of audit rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPage'

  /tenants/{tenant_id}/audit/exports:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [audit]
      summary: Export filtered audit rows to a customer-GPG-encrypted CSV
      operationId: auditExport
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuditExportRequest' }
      responses:
        '202':
          description: Export job accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditExportAccepted' }

  # -----------------------------------------------------------------------
  # OAuth + IdP webhook
  # -----------------------------------------------------------------------
  /oauth/{tenant_slug}/authorize:
    parameters:
      - in: path
        name: tenant_slug
        required: true
        schema: { type: string }
    get:
      tags: [oauth]
      summary: OIDC authorize endpoint
      operationId: oauthAuthorize
      parameters:
        - in: query
          name: response_type
          required: true
          schema: { type: string, enum: [code] }
        - in: query
          name: client_id
          required: true
          schema: { type: string }
        - in: query
          name: redirect_uri
          required: true
          schema: { type: string, format: uri }
        - in: query
          name: scope
          schema: { type: string }
        - in: query
          name: state
          required: true
          schema: { type: string }
        - in: query
          name: code_challenge
          schema: { type: string }
        - in: query
          name: code_challenge_method
          schema: { type: string, enum: [S256] }
      responses:
        '302':
          description: Redirect to IdP.
          headers:
            Location: { schema: { type: string, format: uri } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /oauth/{tenant_slug}/token:
    parameters:
      - in: path
        name: tenant_slug
        required: true
        schema: { type: string }
    post:
      tags: [oauth]
      summary: "OIDC token endpoint (RFC 6749). NOTE: this endpoint does NOT use the platform Idempotency-Key header; the OIDC grant types enforce their own idempotency (`authorization_code` is single-use, `refresh_token` returns the same access token until rotation, `client_credentials` is naturally idempotent)."
      operationId: oauthToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type: { type: string, enum: [authorization_code, refresh_token, client_credentials] }
                code: { type: string }
                redirect_uri: { type: string, format: uri }
                client_id: { type: string }
                client_secret: { type: string }
                refresh_token: { type: string }
                code_verifier: { type: string }
      responses:
        '200':
          description: Token bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /webhooks/idp-revoke:
    post:
      tags: [oauth]
      summary: "IdP revocation webhook (HMAC-SHA256, `X-IdP-Signature: sha256=<hex>`)"
      operationId: idpRevokeWebhook
      parameters:
        - in: header
          name: X-IdP-Signature
          required: true
          schema: { type: string, pattern: '^sha256=[a-f0-9]{64}$' }
        - in: header
          name: X-IdP-Timestamp
          required: true
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, jti, action]
              properties:
                tenant_id: { type: string, format: uuid }
                jti: { type: string, description: "JWT id to revoke" }
                action: { type: string, enum: [revoke] }
                reason: { type: string }
      responses:
        '200':
          description: Revocation recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ack' }
        '401':
          description: INVALID_SIGNATURE (HMAC mismatch).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /.well-known/jwks.json:
    get:
      tags: [oauth]
      summary: JWKS for the platform JWT
      operationId: jwks
      security: []
      responses:
        '200':
          description: JWKS.
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items: { $ref: '#/components/schemas/JWK' }

  # -----------------------------------------------------------------------
  # Events
  # -----------------------------------------------------------------------
  /events/publish:
    post:
      tags: [events]
      summary: Publish an event to the in-cluster bus (NATS) + bridge to the audit account (SQS)
      operationId: publishEvent
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventPublishRequest' }
      responses:
        '202':
          description: Accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventPublishResponse' }

  /events/{event_id}/status:
    parameters:
      - in: path
        name: event_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [events]
      summary: Get the delivery status of an event
      operationId: eventStatus
      responses:
        '200':
          description: Status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventStatus' }

  # -----------------------------------------------------------------------
  # Health
  # -----------------------------------------------------------------------
  /healthz:
    get:
      tags: [health]
      summary: Liveness
      operationId: liveness
      security: []
      responses:
        '200':
          description: Live.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }
                  version: { type: string }

  /readyz:
    get:
      tags: [health]
      summary: Readiness (checks DB, Redis, NATS, OIDC, model provider)
      operationId: readiness
      security: []
      responses:
        '200':
          description: Ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheck' }
        '503':
          description: Degraded; one or more deps are down.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheck' }

# =======================================================================
# Components
# =======================================================================
components:

  # -----------------------------------------------------------------------
  # Reusable parameters
  # -----------------------------------------------------------------------
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      description: UUIDv4. Same key + same body = replay (cached response). Same key + different body = 409 IDEMPOTENCY_CONFLICT. See ADR-0004.
      schema:
        type: string
        format: uuid
    RunId:
      in: path
      name: run_id
      required: true
      schema: { type: string, format: uuid }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      in: query
      name: cursor
      schema: { type: string, description: "Opaque cursor returned by the prior page (next_cursor)." }

  # -----------------------------------------------------------------------
  # Reusable responses
  # -----------------------------------------------------------------------
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated, but not authorized for this resource.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found, or not in caller's scope.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    IdempotencyConflict:
      description: Same Idempotency-Key + different request fingerprint.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Per-tenant or per-token bucket tripped.
      headers:
        Retry-After: { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BudgetExceeded:
      description: BUDGET_EXCEEDED — per-run or per-tenant budget ceiling hit.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  # -----------------------------------------------------------------------
  # Security schemes
  # -----------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC JWT issued by `apps/identity-broker`. Audience is `forge-runtime` for
        service callers and `forge-console` for the console. The token carries
        `tenant_id`, `role`, and (for the agent runtime) a `run_id` and
        `allow_list` (per architecture memory §4 + security memory §4).

  # -----------------------------------------------------------------------
  # Schemas
  # -----------------------------------------------------------------------
  schemas:

    # ---------- Error envelope ---------------------------------------------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: Stable error code. See lld.md §7 for the canonical table.
              examples: [TENANT_NOT_FOUND, IDEMPOTENCY_CONFLICT, BUDGET_EXCEEDED, TOOL_NOT_IN_ALLOW_LIST, STAGE_MISMATCH, INVALID_SIGNATURE, CIRCUIT_OPEN, INTERNAL]
            message:
              type: string
              description: Human-readable; NOT stable. Safe to display to operators, not to end users.
            request_id:
              type: string
              format: uuid
            retry_after_ms:
              type: integer
              nullable: true
              description: Hint to the client; nullable.

    # ---------- Enums ------------------------------------------------------
    RunStatus:
      type: string
      enum: [created, running, waiting_approval, paused, aborted, finished, done]
    StageStatus:
      type: string
      enum: [pending, running, waiting_approval, approved, rejected, returned, skipped]
    Stage:
      type: string
      enum: [ideation, architect, dev, qa, security, devops, docs]
    IssueStatus:
      type: string
      enum: [backlog, todo, in_progress, in_review, blocked, done, cancelled]
    TriggerKind:
      type: string
      enum: [user, slack, email, schedule, webhook]
    DecisionKind:
      type: string
      enum: [NEXT, RETURN, ABORT]
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected, expired]
    ApprovalDecisionKind:
      type: string
      enum: [accept, reject, request_changes]

    # ---------- Runs -------------------------------------------------------
    CreateRunRequest:
      type: object
      required: [goal_id, project_id, trigger]
      properties:
        goal_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        trigger:
          type: object
          required: [kind, actor]
          properties:
            kind: { $ref: '#/components/schemas/TriggerKind' }
            actor: { type: string, description: "user id, slack channel, email address, schedule name, etc." }
            payload_ref:
              type: string
              description: Pointer to the trigger payload (S3 key, Jira issue key, etc.)
        labels:
          type: object
          additionalProperties: { type: string }
        cost_ceiling_usd:
          type: number
          format: double
          minimum: 0
          default: 50
          description: "Per-run ceiling. Default $50 (PRD §8)."

    Run:
      type: object
      required: [id, tenant_id, status, current_stage, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/RunStatus' }
        current_stage: { $ref: '#/components/schemas/Stage' }
        goal_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        trigger:
          type: object
          properties:
            kind: { $ref: '#/components/schemas/TriggerKind' }
            actor: { type: string }
        cost_estimate: { $ref: '#/components/schemas/Money' }
        cost_actual: { $ref: '#/components/schemas/Money' }
        cost_ceiling_usd: { type: number, format: double }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        labels:
          type: object
          additionalProperties: { type: string }

    RunPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Run' }
        next_cursor: { type: string, nullable: true }
        total_estimate: { type: integer, nullable: true }

    RunContext:
      type: object
      required: [run_id, tenant_id, stage, status, allow_list]
      properties:
        run_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        stage: { $ref: '#/components/schemas/Stage' }
        status: { $ref: '#/components/schemas/StageStatus' }
        allow_list:
          type: object
          required: [allow, deny]
          properties:
            allow:
              type: array
              items:
                type: object
                required: [tool]
                properties:
                  tool: { type: string }
                  max_per_run: { type: integer, minimum: 0 }
            deny:
              type: array
              items:
                type: object
                required: [tool, reason]
                properties:
                  tool: { type: string }
                  reason: { type: string }
        inputs:
          type: array
          items: { $ref: '#/components/schemas/ArtefactRef' }
        knowledge_layer_refs:
          type: array
          items: { type: string }
          description: "Files from the Knowledge Layer the runtime should load for this stage."

    TransitionRequest:
      type: object
      required: [from_stage, to_stage, decision]
      properties:
        from_stage: { $ref: '#/components/schemas/Stage' }
        to_stage: { $ref: '#/components/schemas/Stage' }
        decision:
          type: object
          required: [kind]
          properties:
            kind: { $ref: '#/components/schemas/DecisionKind' }
            reason: { type: string }
            returned_to_stage: { $ref: '#/components/schemas/Stage' }
        artefact: { $ref: '#/components/schemas/ArtefactRef' }

    StageDecision:
      type: object
      required: [run_id, current_stage, status, event_id]
      properties:
        run_id: { type: string, format: uuid }
        current_stage: { $ref: '#/components/schemas/Stage' }
        status: { $ref: '#/components/schemas/StageStatus' }
        event_id: { type: string, format: uuid, description: "The published event_id (UUIDv7)." }

    RunStage:
      type: object
      required: [stage, status]
      properties:
        stage: { $ref: '#/components/schemas/Stage' }
        status: { $ref: '#/components/schemas/StageStatus' }
        model_provider: { type: string, enum: [anthropic, openai, failover] }
        inputs:
          type: array
          items: { $ref: '#/components/schemas/ArtefactRef' }
        outputs:
          type: array
          items: { $ref: '#/components/schemas/ArtefactRef' }
        artefact_ref: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }

    ArtefactRef:
      type: object
      required: [kind, url, sha256]
      properties:
        kind: { type: string, enum: [adr, pr, report, page, jira, runbook, plan, export] }
        url: { type: string, format: uri }
        sha256: { type: string, pattern: '^[a-f0-9]{64}$' }

    CostReport:
      type: object
      required: [stage, tokens_in, tokens_out, cost_usd]
      properties:
        stage: { $ref: '#/components/schemas/Stage' }
        tokens_in: { type: integer, minimum: 0 }
        tokens_out: { type: integer, minimum: 0 }
        cost_usd: { type: number, format: double, minimum: 0 }
        model_provider: { type: string, enum: [anthropic, openai, failover] }

    Money:
      type: object
      required: [units, nanos]
      properties:
        units: { type: integer, description: "Whole dollars (or whatever the currency's base unit is)." }
        nanos: { type: integer, minimum: 0, maximum: 999999999, description: "1e-9 of the base unit." }
        currency: { type: string, minLength: 3, maxLength: 3, default: USD }

    Ack:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        event_id: { type: string, format: uuid, nullable: true }

    # ---------- Approvals --------------------------------------------------
    Approval:
      type: object
      required: [id, run_id, gate_kind, required_role, status, requested_at, expires_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        stage: { allOf: [ { $ref: '#/components/schemas/Stage' } ], nullable: true }
        gate_kind: { type: string, enum: ['ideation->architect', 'architect->dev', 'dev->qa', 'qa->security', 'security->devops', 'devops->docs', 'docs->done', 'launch', 'incident_mitigation'] }
        required_role: { type: string, enum: [pm, cto, ceo, qa, security, devops, docs, engineer, board] }
        status: { $ref: '#/components/schemas/ApprovalStatus' }
        paperclip_interaction_id: { type: string, nullable: true }
        artefact_refs:
          type: array
          items: { $ref: '#/components/schemas/ArtefactRef' }
        reason: { type: string, nullable: true }
        decision: { allOf: [{ $ref: '#/components/schemas/ApprovalDecisionKind' }], nullable: true }
        decided_by: { type: object, additionalProperties: true, nullable: true }
        requested_at: { type: string, format: date-time }
        decided_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time }
        paged_at_50_percent: { type: boolean }
        superseded_interaction_id: { type: string, nullable: true }

    ApprovalPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Approval' }
        next_cursor: { type: string, nullable: true }
        total_estimate: { type: integer, nullable: true }

    ApprovalDecision:
      type: object
      required: [decision, decided_by]
      properties:
        decision: { $ref: '#/components/schemas/ApprovalDecisionKind' }
        decided_by:
          type: object
          required: [actor, role]
          properties:
            actor: { type: string, description: "user id, agent name, or 'board'" }
            role: { type: string, enum: [pm, cto, ceo, qa, security, devops, docs, engineer, board] }
        reason: { type: string }

    # ---------- Interactions ----------------------------------------------
    CreateInteractionRequest:
      type: object
      required: [kind, prompt]
      properties:
        kind: { type: string, enum: [request_confirmation, suggest_tasks, ask_user_questions] }
        schema_version: { type: integer, default: 1 }
        prompt: { type: string, description: "Full prompt text. Per the interaction schema, options/buttons are baked into the prompt text." }
        allow_decline_reason: { type: boolean, default: true }
        supersede_on_user_comment: { type: boolean, default: false }
        run_id: { type: string, format: uuid, nullable: true }
        issue_id: { type: string, format: uuid, nullable: true }
        questions:
          type: array
          description: "When kind=ask_user_questions. Each question uses selectionMode, not type."
          items:
            type: object
            required: [id, prompt, options, selection_mode]
            properties:
              id: { type: string }
              prompt: { type: string }
              header: { type: string, description: "Short chip label (max 12 chars)." }
              options:
                type: array
                minItems: 2
                maxItems: 4
                items:
                  type: object
                  required: [label, description]
                  properties:
                    label: { type: string }
                    description: { type: string }
              selection_mode: { type: string, enum: [single, multi] }

    Interaction:
      type: object
      required: [id, kind, status, created_at]
      properties:
        id: { type: string }
        kind: { type: string, enum: [request_confirmation, suggest_tasks, ask_user_questions] }
        status: { type: string, enum: [pending, accepted, declined, expired, superseded] }
        schema_version: { type: integer }
        prompt: { type: string }
        response: { type: object, additionalProperties: true, nullable: true }
        run_id: { type: string, format: uuid, nullable: true }
        issue_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        decided_at: { type: string, format: date-time, nullable: true }

    # ---------- Comments ---------------------------------------------------
    CreateComment:
      type: object
      required: [body]
      properties:
        body:
          type: string
          description: Markdown. Secret-scanned on write (security memory §3).
        author_type:
          type: string
          enum: [user, agent, system]
          default: agent
        author_agent_id: { type: string, nullable: true }
        author_user_id: { type: string, nullable: true }
        parent_comment_id: { type: string, nullable: true }

    Comment:
      allOf:
        - $ref: '#/components/schemas/CreateComment'
        - type: object
          required: [id, run_id, created_at]
          properties:
            id: { type: string, format: uuid }
            run_id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }

    CommentPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Comment' }
        next_cursor: { type: string, nullable: true }

    # ---------- Agents -----------------------------------------------------
    CreateAgent:
      type: object
      required: [name, role, charter_ref]
      properties:
        name: { type: string, pattern: '^[a-z][a-z0-9-]{1,62}[a-z0-9]$' }
        role:
          type: string
          enum: [pm, engineer, qa, security, devops, docs, architect, memory, cost, audit, evaluation, refactor]
        title: { type: string }
        icon: { type: string, description: "One of the 32 paperclip icon enum values." }
        charter_ref: { type: string, format: uri, description: "Path to AGENTS.md or instructions bundle." }
        reports_to: { type: string, format: uuid, nullable: true }
        model_default: { type: string, enum: [claude-opus-4-8, claude-sonnet-4-6, claude-haiku-4-5, gpt-4o, gpt-4o-mini] }
        cost_envelope:
          type: object
          properties:
            per_run_ceiling_usd: { type: number, format: double }
            per_run_ceiling_tokens: { type: integer, minimum: 0 }

    Agent:
      allOf:
        - $ref: '#/components/schemas/CreateAgent'
        - type: object
          required: [id, status, created_at]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [active, paused, offboarded] }
            created_at: { type: string, format: date-time }

    AgentPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Agent' }
        next_cursor: { type: string, nullable: true }

    # ---------- Issues -----------------------------------------------------
    CreateIssue:
      type: object
      required: [title, type]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        type: { type: string, enum: [epic, story, task, bug, spike, sub_goal] }
        parent_id: { type: string, format: uuid, nullable: true }
        goal_id: { type: string, format: uuid, nullable: true }
        project_id: { type: string, format: uuid, nullable: true }
        priority: { type: string, enum: [low, medium, high, critical], default: medium }
        labels:
          type: array
          items: { type: string }
        blocked_by:
          type: array
          items: { type: string, format: uuid }
          description: "Issue ids that must close before this one can advance. No cycles; see Paperclip issue-create docs."

    UpdateIssue:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        status: { $ref: '#/components/schemas/IssueStatus' }
        priority: { type: string, enum: [low, medium, high, critical] }
        labels:
          type: array
          items: { type: string }
        assignee_agent_id: { type: string, format: uuid, nullable: true }
        assignee_user_id: { type: string, nullable: true }
        blocked_by:
          type: array
          items: { type: string, format: uuid }

    Issue:
      allOf:
        - $ref: '#/components/schemas/CreateIssue'
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id: { type: string, format: uuid }
            identifier: { type: string, description: "Human identifier (e.g. FORA-35)." }
            status: { $ref: '#/components/schemas/IssueStatus' }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
            deleted_at: { type: string, format: date-time, nullable: true }

    IssuePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Issue' }
        next_cursor: { type: string, nullable: true }

    # ---------- Cloud broker -----------------------------------------------
    AssumeRequest:
      type: object
      required: [provider, role_arn, duration_sec]
      properties:
        provider: { type: string, enum: [aws, azure, gcp] }
        role_arn: { type: string, description: "Provider-specific role identifier." }
        audience: { type: string, description: "OIDC audience; defaults to forge-runtime." }
        duration_sec: { type: integer, minimum: 60, maximum: 3600, default: 900 }
        session_tags:
          type: object
          description: "Stamped on the assumed role's session (AWS: sts:Tags)."
          additionalProperties: { type: string }

    AssumeResponse:
      type: object
      required: [handle_id, provider, expires_at]
      properties:
        handle_id: { type: string, format: uuid }
        provider: { type: string, enum: [aws, azure, gcp] }
        access_key_id: { type: string, description: "Provider-specific. Redacted in audit." }
        secret_access_key: { type: string, description: "Provider-specific. Redacted in audit." }
        session_token: { type: string, description: "Provider-specific. Redacted in audit." }
        expires_at: { type: string, format: date-time }
        role_arn: { type: string }
        session_tags:
          type: object
          additionalProperties: { type: string }

    # ---------- Audit ------------------------------------------------------
    AuditRow:
      type: object
      required: [event_id, ts, tenant_id, actor, tool, result]
      properties:
        event_id: { type: string, format: uuid }
        ts: { type: string, format: date-time }
        tenant_id: { type: string, format: uuid }
        run_id: { type: string, format: uuid, nullable: true }
        stage: { allOf: [ { $ref: '#/components/schemas/Stage' } ], nullable: true }
        actor: { type: string, description: "user:id | agent:name | system:probe" }
        on_behalf_of: { type: string, nullable: true }
        tool: { type: string }
        args_hash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        args_redacted:
          type: object
          required: [redacted, hash]
          properties:
            redacted: { type: boolean }
            redaction_reason: { type: string, nullable: true }
            hash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        result: { type: string, enum: [success, denied, failed, paused] }
        duration_ms: { type: integer, minimum: 0 }
        approval_id: { type: string, format: uuid, nullable: true }
        trace_id: { type: string, nullable: true }
        deny_reason: { type: string, nullable: true, description: "When result=denied." }
        idempotency_key: { type: string, nullable: true }

    AuditPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditRow' }
        next_cursor: { type: string, nullable: true }
        total_estimate: { type: integer, nullable: true }

    AuditExportRequest:
      type: object
      required: [filters, format]
      properties:
        filters:
          type: object
          properties:
            date_from: { type: string, format: date-time }
            date_to: { type: string, format: date-time }
            actor: { type: string }
            tool: { type: string }
            run_id: { type: string, format: uuid }
        format: { type: string, enum: [csv, jsonl] }
        gpg_recipient_fingerprint:
          type: string
          pattern: '^[A-F0-9]{40}$'
          description: "Customer's GPG public-key fingerprint (delivered at onboarding)."

    AuditExportAccepted:
      type: object
      required: [export_id, status]
      properties:
        export_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, ready, failed] }
        signed_url: { type: string, format: uri, nullable: true, description: "When status=ready. Signed URL; expiry=1h." }
        row_count: { type: integer, nullable: true }
        size_bytes: { type: integer, nullable: true }

    # ---------- OAuth ------------------------------------------------------
    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        refresh_token: { type: string, nullable: true }
        id_token: { type: string, nullable: true }
        scope: { type: string, nullable: true }

    JWK:
      type: object
      required: [kty, kid, use, alg]
      properties:
        kty: { type: string, enum: [RSA, EC, oct] }
        kid: { type: string }
        use: { type: string, enum: [sig, enc] }
        alg: { type: string, enum: [RS256, RS384, RS512, ES256, ES384, ES512, PS256, PS384, PS512] }
        n: { type: string, description: "RSA modulus (base64url)." }
        e: { type: string, description: "RSA exponent (base64url)." }
        x: { type: string, description: "EC x coordinate (base64url)." }
        y: { type: string, description: "EC y coordinate (base64url)." }
        crv: { type: string, enum: [P-256, P-384, P-521] }

    # ---------- Events -----------------------------------------------------
    EventPublishRequest:
      type: object
      required: [event_id, tenant_id, event_type, payload]
      properties:
        event_id: { type: string, format: uuid, description: "UUIDv7 (monotonic)." }
        tenant_id: { type: string, format: uuid }
        event_type: { type: string, description: "Namespaced as `fora.events.{tenant_id}.{stage}.{event_type}`." }
        stage: { allOf: [ { $ref: '#/components/schemas/Stage' } ], nullable: true }
        payload: { type: object, additionalProperties: true }
        trace_id: { type: string, nullable: true }

    EventPublishResponse:
      type: object
      required: [event_id, status]
      properties:
        event_id: { type: string, format: uuid }
        status: { type: string, enum: [received, validated, publishing, published, audit_ack, failed, dead_lettered] }

    EventStatus:
      type: object
      required: [event_id, status]
      properties:
        event_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/EventPublishResponse' }
        first_published_at: { type: string, format: date-time, nullable: true }
        audit_ack_at: { type: string, format: date-time, nullable: true }
        failure_reason: { type: string, nullable: true }

    # ---------- Health -----------------------------------------------------
    HealthCheck:
      type: object
      required: [state, version, deps]
      properties:
        state: { type: string, enum: [SERVING, DEGRADED, NOT_SERVING] }
        version: { type: string }
        deps:
          type: object
          additionalProperties: { type: string, enum: [ok, down, degraded] }

