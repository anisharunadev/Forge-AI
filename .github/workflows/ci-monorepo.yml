name: ci-monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9.12.3"
  NODE_VERSION: "22"

jobs:
  install:
    name: pnpm install (frozen lockfile)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Verify lockfile
        run: |
          pnpm install --frozen-lockfile
          echo "Lockfile is in sync with package.json files"

      - name: Cache node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

  validate-workspace:
    name: validate pnpm-workspace.yaml
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Validate workspace yaml
        run: |
          pnpm exec yaml --version
          pnpm exec js-yaml pnpm-workspace.yaml > /tmp/ws.json
          node -e "
          const ws = require('/tmp/ws.json');
          if (!Array.isArray(ws.packages)) {
            throw new Error('pnpm-workspace.yaml must define packages array');
          }
          if (ws.packages.length === 0) {
            throw new Error('pnpm-workspace.yaml has no packages');
          }
          console.log('Workspace has', ws.packages.length, 'package globs');
          "

      - name: Verify all listed packages exist
        run: |
          node -e "
          const ws = require('yaml').parse(require('fs').readFileSync('pnpm-workspace.yaml', 'utf8'));
          const fs = require('fs');
          const path = require('path');
          let missing = [];
          for (const glob of ws.packages) {
            const parts = glob.replace(/\/\*$/, '').replace(/^\.\//, '');
            if (!fs.existsSync(parts)) {
              missing.push(glob);
            }
          }
          if (missing.length > 0) {
            console.error('Missing workspace dirs:', missing);
            process.exit(1);
          }
          console.log('All workspace globs resolve');
          "

  typecheck:
    name: pnpm -r typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Recursive typecheck
        run: pnpm -r --workspace-concurrency=2 typecheck

  lint:
    name: pnpm -r lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Recursive lint
        run: pnpm -r --workspace-concurrency=2 lint

  test:
    name: pnpm -r test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Recursive test
        run: pnpm -r --workspace-concurrency=2 test

  circular-deps:
    name: check circular deps
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [install]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Restore node_modules
        uses: actions/cache@v4.2.0
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: madge --circular
        run: |
          pnpm dlx madge@8.0.0 --circular --extensions ts,tsx,js,jsx apps packages || true
          pnpm dlge depcheck@1.4.7 apps packages --ignores="@types/*,eslint-*" || true

  adr-consistency:
    name: ADR consistency check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Run ADR validator
        run: |
          python - <<'PY'
          import os, re, sys, json, subprocess
          from pathlib import Path

          root = Path(".")
          adr_dir = root / "docs" / "architecture" / "decisions"
          adrs = {}
          if adr_dir.exists():
              for p in adr_dir.glob("*.md"):
                  m = re.match(r"^(\d{4})-", p.name)
                  if m:
                      adrs[p.name] = p
          print(f"Found {len(adrs)} ADRs")

          # Get changed files in the PR
          event = json.loads(os.environ.get("GITHUB_EVENT_PAYLOAD", "{}"))
          changed = set()
          for pr in event.get("pull_request", {}).get("changed_files", []):
              changed.add(pr["filename"])
          if not changed and os.environ.get("GITHUB_BASE_REF"):
              out = subprocess.run(
                  ["git", "diff", "--name-only",
                   f"origin/{os.environ['GITHUB_BASE_REF']}...HEAD"],
                  capture_output=True, text=True
              ).stdout
              changed = {l for l in out.splitlines() if l.strip()}

          skip_paths = (".github/", "docs/", "*.md", "*.lock")
          relevant = []
          for f in changed:
              if any(fnmatch.fnmatch(f, pat) for pat in skip_paths):
                  continue
              if re.match(r"^(apps|packages|backend|mcp-servers|infra)/", f):
                  relevant.append(f)

          if not relevant:
              print("No code files changed; ADR check skipped")
              sys.exit(0)

          # Search commit messages or PR body for ADR reference
          pr_body = event.get("pull_request", {}).get("body", "") or ""
          commit_msgs = subprocess.run(
              ["git", "log", "--format=%s%n%n%b", f"HEAD~5..HEAD"],
              capture_output=True, text=True
          ).stdout

          has_ref = bool(re.search(r"(ADR|NFR|FR)-?\d{3}", pr_body + commit_msgs, re.IGNORECASE))
          if not has_ref:
              print("WARNING: Code change does not reference any ADR/NFR/FR")
              # Do not fail the build, but warn
          print("ADR consistency check passed")
          PY

  build-status:
    name: build-status
    runs-on: ubuntu-24.04
    needs: [validate-workspace, typecheck, lint, test, circular-deps, adr-consistency]
    if: always()
    steps:
      - name: Report overall status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more monorepo CI jobs failed"
            exit 1
          fi
          echo "All monorepo CI jobs passed"
