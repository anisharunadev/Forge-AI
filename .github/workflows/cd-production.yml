name: cd-production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3)"
        required: true
        type: string
      skip_canary:
        description: "Skip canary (full rollout only)"
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_BACKEND: ${{ secrets.ECS_SERVICE_BACKEND }}
  ECS_SERVICE_FRONTEND: ${{ secrets.ECS_SERVICE_FRONTEND }}
  PRODUCTION_URL: https://app.forge-ai.com
  DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  build-and-tag:
    name: build-and-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.image }}
      frontend_image: ${{ steps.meta-frontend.outputs.image }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build backend image
        id: meta-backend
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/forge-backend:${{ steps.version.outputs.version }}
            ${{ env.ECR_REGISTRY }}/forge-backend:${{ steps.version.outputs.version }}-{{ github.sha }}
            ${{ env.ECR_REGISTRY }}/forge-backend:production-latest

      - name: Build frontend image
        id: meta-frontend
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./apps/forge
          file: ./apps/forge/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/forge-ui:${{ steps.version.outputs.version }}
            ${{ env.ECR_REGISTRY }}/forge-ui:${{ steps.version.outputs.version }}-{{ github.sha }}
            ${{ env.ECR_REGISTRY }}/forge-ui:production-latest

  deploy-canary:
    name: deploy-canary (10% for 30 min)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [build-and-tag]
    if: ${{ inputs.skip_canary != true && github.event_name == 'push' }}
    environment:
      name: production-canary
      url: ${{ env.PRODUCTION_URL }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy canary (10% traffic)
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BACKEND }}-canary" \
            --task-definition "forge-backend:${{ needs.build-and-tag.outputs.version }}" \
            --desired-count 1 \
            --deployment-configuration "maximumPercent=100,minimumHealthyPercent=0"
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_FRONTEND }}-canary" \
            --task-definition "forge-ui:${{ needs.build-and-tag.outputs.version }}" \
            --desired-count 1

  monitor-canary:
    name: monitor-canary (30 min error rate check)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: [deploy-canary]
    steps:
      - name: Check Datadog error rate
        run: |
          python - <<'PY'
          import os, time, json, urllib.request
          from datetime import datetime, timedelta, timezone

          api_key = os.environ["DATADOG_API_KEY"]
          app_key = os.environ["DATADOG_APP_KEY"]
          end = datetime.now(timezone.utc)
          start = end - timedelta(minutes=30)

          url = (
              f"https://api.datadoghq.com/api/v1/query?from={int(start.timestamp())}"
              f"&to={int(end.timestamp())}&query=sum:trace.flask.request.errors{service:forge-backend,env:canary}.as_rate()"
          )
          req = urllib.request.Request(url, headers={"DD-API-KEY": api_key, "DD-APPLICATION-KEY": app_key})
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.load(r)

          series = data.get("series", [])
          if not series:
              print("No canary traffic yet")
              time.sleep(60)
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
              series = data.get("series", [])
          if not series:
              print("Still no canary traffic; assuming healthy")
              sys.exit(0)
          for s in series:
              for point in s.get("pointlist", []):
                  if point[1] is not None and point[1] > 0.05:
                      print(f"ERROR RATE TOO HIGH: {point[1]}")
                      sys.exit(1)
          print("Canary error rate within bounds")
          PY

      - name: Check Sentry issue count
        run: |
          python - <<'PY'
          import os, json, urllib.request
          token = os.environ["SENTRY_AUTH_TOKEN"]
          url = "https://sentry.io/api/0/projects/forge-ai/forge-backend/issues/?query=is:unresolved+environment:canary"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          with urllib.request.urlopen(req, timeout=30) as r:
              issues = json.load(r)
          print(f"Canary Sentry issues: {len(issues)}")
          if len(issues) > 5:
              print("Too many new Sentry issues; failing canary")
              import sys; sys.exit(1)
          PY

  deploy-full:
    name: deploy-full (100% rollout)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [build-and-tag, monitor-canary]
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend 100%
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BACKEND }}" \
            --task-definition "forge-backend:${{ needs.build-and-tag.outputs.version }}" \
            --force-new-deployment

      - name: Deploy frontend 100%
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_FRONTEND }}" \
            --task-definition "forge-ui:${{ needs.build-and-tag.outputs.version }}" \
            --force-new-deployment

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" "${{ env.ECS_SERVICE_FRONTEND }}"

  post-deploy-verification:
    name: post-deploy-verification
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [deploy-full]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip==24.2
          pip install requests==2.32.3

      - name: Wait 2 min for traffic stabilization
        run: sleep 120

      - name: Critical path smoke
        run: |
          python scripts/critical_path.py \
            --base-url "${{ env.PRODUCTION_URL }}" \
            --paths "auth.login,workspace.list,terminal.open,agent.invoke"

      - name: Synthetic monitoring kickoff
        run: |
          curl -X POST "https://api.datadoghq.com/api/v1/synthetics/tests/run" \
            -H "DD-API-KEY: ${{ env.DATADOG_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"tests": ["smoke-prod"]}'

  rollback:
    name: rollback
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [deploy-full, post-deploy-verification]
    if: failure()
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback to previous taskdef
        run: |
          PREV_BACKEND=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' --output text)
          PREV_FRONTEND=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_FRONTEND }}" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' --output text)
          # Use secrets for the previous known good
          aws ecs update-service --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BACKEND }}" \
            --task-definition "${{ secrets.ECS_BACKEND_PREVIOUS_TASKDEF }}"
          aws ecs update-service --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_FRONTEND }}" \
            --task-definition "${{ secrets.ECS_FRONTEND_PREVIOUS_TASKDEF }}"

      - name: Page on-call
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":fire: PRODUCTION rollback executed for ${{ needs.build-and-tag.outputs.version }}. On-call paged."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ONCALL }}

      - name: Create incident
        run: |
          curl -X POST "https://api.pagerduty.com/incidents" \
            -H "Authorization: Token token=${{ secrets.PAGERDUTY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "incident": {
                "type": "incident",
                "title": "Forge AI production rollback",
                "service": {"id": "${{ secrets.PAGERDUTY_SERVICE_ID }}", "type": "service_reference"},
                "urgency": "high",
                "body": {"type": "incident_body", "details": "Auto rollback triggered by deploy failure"}
              }
            }'
