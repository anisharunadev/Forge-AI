name: baseline

# Weekly reproducible test failure ledger — runs scripts/run-test-baseline.sh,
# uploads artifacts (30-day retention), and surfaces net-new P0 failures as a
# PR-comment annotation when invoked via workflow_dispatch.

on:
  schedule:
    - cron: "0 0 * * 1"   # Mon 00:00 UTC
  workflow_dispatch:
    inputs:
      quick:
        description: "Skip Playwright (no chromium)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: baseline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  baseline:
    name: Test failure ledger
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Install frontend deps
        working-directory: apps/forge
        run: pnpm install --frozen-lockfile

      - name: Run baseline
        run: ./scripts/run-test-baseline.sh ${{ inputs.quick && '--quick' || '' }}

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-baseline-${{ github.run_id }}
          path: test-results/baseline/
          retention-days: 30

      - name: Summarize
        if: always()
        run: |
          echo "### Baseline summary" >> "$GITHUB_STEP_SUMMARY"
          python -c "
          import json, glob, os
          for p in glob.glob('test-results/baseline/*/summary.json'):
              d = json.load(open(p))
              for s, info in d['surfaces'].items():
                  print(f'  {s}: exit={info[\"exit_code\"]} elapsed={info[\"elapsed_seconds\"]}s')
              break
          " >> "$GITHUB_STEP_SUMMARY"
