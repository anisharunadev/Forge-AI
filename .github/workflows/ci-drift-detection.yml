name: ci-drift-detection

# Plan J commit 5 — nightly drift detection for the acme-corp demo seed.
#
# Catches a class of regression that the per-PR idempotency test in
# `ci-seed.yml` cannot: a seed that re-applies cleanly (no error, no
# new rows) but whose computed checksum shifts on a re-run because
# the manifest itself was edited in a way that does not violate
# upsert invariants. The Plan E2 `test_drift_detection.py` suite
# covers this at the unit level; this workflow is the CI-level
# gate that protects against silent drift between releases.
#
# Schedule: 02:00 UTC every day. The exact minute is offset from
# :00 / :30 to avoid fleet-wide thundering-herd on the postgres
# service. Manual runs (`workflow_dispatch`) are also wired so a
# Steward can re-run the check after applying a content update.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  PYTHON_DEFAULT_VERSION: "3.13"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "0"

jobs:
  check-drift:
    name: drift detection (acme-corp checksum stability)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: forge_test
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/forge_test
      TESTING: "true"
      ENVIRONMENT: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Apply acme-corp seed (baseline)
        working-directory: backend
        run: python -m backend.seeds.framework.apply_seed acme-corp --env=test

      - name: Capture baseline checksum
        working-directory: backend
        run: |
          python -c "
          import asyncio
          from sqlalchemy import select
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.db.models import SeedMigration

          async def main() -> None:
              engine = create_async_engine('${DATABASE_URL}')
              async with engine.connect() as conn:
                  result = await conn.execute(
                      select(SeedMigration).where(SeedMigration.seed_name == 'acme-corp')
                  )
                  row = result.scalars().first()
                  if row is None:
                      raise SystemExit('no acme-corp migration row found')
                  print(f'CHECKSUM={row.checksum}')
              await engine.dispose()

          asyncio.run(main())
          " | tee baseline_checksum.txt

      - name: Re-apply and compare checksums
        working-directory: backend
        run: |
          python -m backend.seeds.framework.apply_seed acme-corp --env=test
          python -c "
          import asyncio
          from sqlalchemy import select
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.db.models import SeedMigration

          async def main() -> None:
              engine = create_async_engine('${DATABASE_URL}')
              async with engine.connect() as conn:
                  result = await conn.execute(
                      select(SeedMigration).where(SeedMigration.seed_name == 'acme-corp')
                  )
                  row = result.scalars().first()
                  if row is None:
                      raise SystemExit('no acme-corp migration row found after re-apply')
                  print(f'CHECKSUM={row.checksum}')
              await engine.dispose()

          asyncio.run(main())
          " | tee current_checksum.txt

      - name: Verify checksum stability
        working-directory: backend
        run: |
          if ! diff -q baseline_checksum.txt current_checksum.txt > /dev/null; then
            echo "::error::Drift detected — applied acme-corp checksum changed on re-apply"
            echo "--- baseline ---"
            cat baseline_checksum.txt
            echo "--- current ---"
            cat current_checksum.txt
            exit 1
          fi
          echo "No drift detected (checksum stable across re-apply)"

      - name: Upload checksum artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: seed-drift-checksums
          path: |
            backend/baseline_checksum.txt
            backend/current_checksum.txt
          retention-days: 30
