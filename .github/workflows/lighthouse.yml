name: lighthouse

# M12 — Production Hardening (G4).
#
# Runs Lighthouse CI against all 9 centers (parent spec §5 M12).
# Fails on any assertion violation in `.lighthouserc.json`.

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  lighthouse-ci:
    name: Lighthouse CI (9 centers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install forge dependencies
        run: |
          cd apps/forge
          pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: |
          pnpm dlx @lhci/cli@0.13.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}