# Step 6 — CI Lighthouse workflow (canonical Lighthouse numbers).
#
# This workflow replaces the local Lighthouse run that the sandbox
# cannot perform (Turbopack cache lockfile → EACCES). It builds the
# Next.js production artifact on an ubuntu-latest runner, boots
# `next start` on a free port, and runs `treosh/lighthouse-ci-action`
# against the two demo-critical routes.
#
# Gate thresholds (Step 6 spec):
#   - Agent Center    (/agent-center)     Accessibility ≥ 95, Performance ≥ 90
#   - Ideation Center (/ideation)        Accessibility ≥ 95, Performance ≥ 90
#
# A failure to meet either threshold fails the build.

name: Lighthouse (Step 6 gate)

on:
  pull_request:
    paths:
      - 'apps/forge/**'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORA_FORGE_PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: cd apps/forge && pnpm install --frozen-lockfile

      - name: Build production artifact
        run: cd apps/forge && pnpm build

      - name: Start Next.js production server
        run: cd apps/forge && (pnpm start &) && sleep 8

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

      - name: Assert thresholds
        run: |
          node scripts/lighthouse-thresholds.mjs \
            --agent-center .lighthouseci/agent-center.json \
            --ideation .lighthouseci/ideation.json
