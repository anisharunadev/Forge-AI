name: invariant

# M12 — Production Hardening (G2 + G3).
#
# Runs the audit-completeness + cost-admission invariant tests on every
# push and PR. These tests are pure AST analysis (no DB / no network)
# so they execute in <1s and block merge on any regression.

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  audit-completeness:
    name: Audit completeness invariant
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run invariant
        working-directory: backend
        run: |
          pytest tests/test_audit_invariant.py -v --tb=short

  cost-admission:
    name: Cost admission invariant
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run invariant
        working-directory: backend
        run: |
          pytest tests/test_cost_admission_invariant.py -v --tb=short