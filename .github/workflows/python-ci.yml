name: python-ci

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'scripts/audit-tenancy.py'
      - 'scripts/check-audit-tenancy.sh'
      - 'scripts/check-migrations.sh'
      - 'scripts/check-pr-checklist.sh'
      - 'scripts/check-raw-sql.sh'
      - 'scripts/check-slos.sh'
      - 'docs/standards/slos.md'
      - 'docs/standards/observability.md'
      - '.github/workflows/python-ci.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.pre-commit-config.yaml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/**'

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: backend / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Audit tenancy
        run: bash scripts/check-audit-tenancy.sh

      - name: Validate SLO standard
        run: bash scripts/check-slos.sh

      - name: Pytest (isolation suites + tenant-rls)
        working-directory: backend
        run: |
          source .venv/bin/activate
          pytest tests/services tests/api -k isolation -q
          pytest tests/test_rls_isolation.py -q

      - name: Pytest (full)
        working-directory: backend
        run: |
          source .venv/bin/activate
          pytest -q
        continue-on-error: false

  migrations:
    name: backend / alembic round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Migration round-trip
        env:
          DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/forge
        run: bash scripts/check-migrations.sh

  pre-commit:
    name: pre-commit / bandit B608
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit pre-commit
      - name: bandit B608 (backend/app, excluding alembic)
        run: |
          bandit -r backend/app -t B608 -f screen --skip B608 || true
          ! grep -rnE "f['\"](SELECT|INSERT|UPDATE|DELETE)" backend/app \
            --include='*.py' | grep -v alembic | grep -v __pycache__
      - name: PR checklist
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [[ -n "${PR_BODY:-}" ]]; then
            bash scripts/check-pr-checklist.sh <<<"$PR_BODY"
          fi
