name: cd-staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force redeploy"
        type: boolean
        default: false

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_BACKEND: ${{ secrets.ECS_SERVICE_BACKEND }}
  ECS_SERVICE_FRONTEND: ${{ secrets.ECS_SERVICE_FRONTEND }}
  STAGING_URL: https://staging.forge-ai.internal

jobs:
  build-images:
    name: build-images (backend + forge-ui)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_image: ${{ steps.meta-backend.outputs.image }}
      frontend_image: ${{ steps.meta-frontend.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Cache Docker layers
        uses: actions/cache@v4.2.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=${SHORT_SHA}-staging" >> "$GITHUB_OUTPUT"
          echo "latest=staging-latest" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        id: meta-backend
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/forge-backend:${{ steps.tags.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/forge-backend:${{ steps.tags.outputs.latest }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: meta-frontend
        uses: docker/build-push-action@v6.10.0
        with:
          context: ./apps/forge
          file: ./apps/forge/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/forge-ui:${{ steps.tags.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/forge-ui:${{ steps.tags.outputs.latest }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: deploy-staging (ECS rolling update)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [build-images]
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definitions
        id: taskdef
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          python - <<PY
          import json, os
          sha = "$SHORT_SHA"
          for name, src in [
              ("backend", "infra/ecs/backend.taskdef.json"),
              ("frontend", "infra/ecs/frontend.taskdef.json"),
          ]:
              with open(src) as f:
                  td = json.load(f)
              for c in td["containerDefinitions"]:
                  c["image"] = f"${{ env.ECR_REGISTRY }}/forge-{name}:{sha}-staging"
              out = f"{name}.taskdef.json"
              with open(out, "w") as f:
                  json.dump(td, f, indent=2)
              print(f"Wrote {out}")
          PY

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-render-task-definition@v1.1.4
        with:
          task-definition: backend.taskdef.json
          container-name: forge-backend
          image: ${{ needs.build-images.outputs.backend_image }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-render-task-definition@v1.1.4
        with:
          task-definition: frontend.taskdef.json
          container-name: forge-ui
          image: ${{ needs.build-images.outputs.frontend_image }}

  smoke-tests:
    name: smoke-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [deploy-staging]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Wait for service stabilization
        run: |
          echo "Waiting 60s for ECS service to stabilize..."
          sleep 60

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Install smoke test deps
        run: |
          python -m pip install --upgrade pip==24.2
          pip install requests==2.32.3

      - name: Run smoke tests
        id: smoke
        run: |
          python scripts/smoke.py \
            --base-url "${{ env.STAGING_URL }}" \
            --endpoints "/health,/api/v1/health,/api/v1/ready" \
            --timeout 30 \
            --retries 3
        continue-on-error: true

      - name: Report smoke result
        if: steps.smoke.outcome != 'success'
        run: |
          echo "Smoke tests FAILED"
          exit 1

  rollback-on-failure:
    name: rollback-on-failure
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [smoke-tests]
    if: failure()
    environment:
      name: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback backend ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BACKEND }}" \
            --task-definition "${{ secrets.ECS_BACKEND_PREVIOUS_TASKDEF }}" \
            --force-new-deployment

      - name: Rollback frontend ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_FRONTEND }}" \
            --task-definition "${{ secrets.ECS_FRONTEND_PREVIOUS_TASKDEF }}" \
            --force-new-deployment

      - name: Notify rollback
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rotating_light: Staging deployment FAILED and was rolled back for commit ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
