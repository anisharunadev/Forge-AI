name: rls

# M12 — Production Hardening (G1).
#
# Runs the two-tenant RLS isolation smoke test on every push and PR.
# Fails the build if any cross-tenant query returns data it shouldn't.
#
# Locked contract: test_rls_isolation.py must have ≥10 cases (parent
# spec §2 G1 deliverable: "Two-tenant smoke test in CI; blocks merge
# if RLS violation").

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  rls-smoke:
    name: RLS two-tenant isolation smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd backend
          uv sync --frozen
          uv pip install pytest pytest-asyncio sqlalchemy aiosqlite

      - name: Run RLS isolation tests
        run: |
          cd backend
          uv run pytest tests/test_rls_isolation.py -v --tb=short

      - name: Enforce floor (≥10 cases)
        run: |
          cd backend
          count=$(grep -cE "async def test_|def test_" tests/test_rls_isolation.py)
          if [ "$count" -lt 10 ]; then
            echo "::error::test_rls_isolation.py has $count cases (floor: 10)"
            exit 1
          fi
          echo "✅ test_rls_isolation.py has $count cases (meets ≥10 floor)"