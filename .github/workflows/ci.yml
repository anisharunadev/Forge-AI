name: CI

# FORA reference CI pipeline. Four tiers, ordered, each tier gates the next.
# Reference: docs/engineering/standards.md §4.
# Tiers: 1 Static -> 2 Unit -> 3 Integration -> 4 E2E+Evals (nightly / pre-release only).

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so we do not waste CI minutes on
# superseded pushes. E2E/evals keep running because they are scheduled, not PR-gated.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  FORA_CI: 'true'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Tier 1 — Static checks. The cheapest gate. Every push.
  # ─────────────────────────────────────────────────────────────────────
  static:
    name: Tier 1 · Static (lint, tenancy-lint, typecheck, format, secret-scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Lint (ESLint, type-checked)
        run: pnpm lint

      - name: Build tenancy-lint
        run: pnpm --filter @forge-ai/tenancy-lint build

      - name: Tenancy lint (FORA-124 acceptance bar #5)
        # Gates red on `CREATE TABLE` outside `migrations/` and `BYPASSRLS`
        # outside `migrations/`/`audit/`. See packages/tenancy-lint and the
        # `.tenancylintignore` at the repo root for the allow-list.
        run: node packages/tenancy-lint/bin/tenancy-lint.mjs .

      - name: Agent IAM lint (FORA-125 acceptance bar #3)
        # Gates red on any MCP in roles.yaml with no role binding. Platform
        # default is unbound; adding an MCP without a role binding is a bug.
        # See apps/identity-broker/bin/lint-unbound-mcps.mjs and ADR-0003 §5.1.
        run: node apps/identity-broker/bin/lint-unbound-mcps.mjs --roles config/agent-iam/roles.yaml

      - name: Secrets-block lint (FORA-128.d / FORA-187)
        # Gates red on any `secrets:` block in agent prompts or
        # runbooks that carries a raw value. The platform's invariant
        # is: an agent references a `secret_ref` and the broker
        # materialises the value at the last hop. A raw value in a
        # prompt is a P0 regression. See tools/lint-secrets-blocks.mjs
        # and ADR-0003 §7.1.
        run: node tools/lint-secrets-blocks.mjs --roots agents,tenants,docs/runbooks

      - name: Secrets-block lint self-test (FORA-187 regression)
        run: node tools/lint-secrets-blocks.test.mjs

      - name: Type check (tsc --noEmit)
        run: pnpm typecheck

      - name: Python format + lint (ruff)
        run: |
          pip install ruff
          ruff format --check .
          ruff check .

      - name: Python type check (mypy)
        run: |
          pip install mypy
          mypy --strict

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: gitleaks rule regression (FORA-188 / FORA-128.e)
        # The rule set lives in `.gitleaks.toml` (FORA-specific
        # patterns: GitHub PAT, AWS access key, Anthropic / OpenAI
        # keys, Slack / Stripe / Vault tokens, PEM private keys).
        # The regression test scans the known-bad fixture in
        # `tools/gitleaks/fixtures/known-bad.ts` and asserts every
        # rule fires — preventing a future loosening of the rule set.
        run: node tools/gitleaks/gitleaks-fixture.test.mjs

      - name: Shell script lint (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'
          additional_files: 'shfmt'

  # ─────────────────────────────────────────────────────────────────────
  # Tier 2 — Unit tests. Fast, exhaustive on edge cases.
  # ─────────────────────────────────────────────────────────────────────
  unit:
    name: Tier 2 · Unit
    runs-on: ubuntu-latest
    needs: static
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage
        run: pnpm test:unit -- --coverage --reporter=lcov

      - name: Coverage report
        if: always()
        run: pnpm coverage:report

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # Tier 3 — Integration + contract. Real services via testcontainers.
  # ─────────────────────────────────────────────────────────────────────
  integration:
    name: Tier 3 · Integration + Contract
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fora
          POSTGRES_PASSWORD: fora
          POSTGRES_DB: fora_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U fora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fora:fora@localhost:5432/fora_test
      REDIS_URL: redis://localhost:6379
      MCP_FAKE_MODE: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contract tests (MCP adapters, agent handoff envelopes)
        run: pnpm test:contract

      - name: Integration tests (testcontainers + ephemeral services)
        run: pnpm test:integration

      - name: Dependency audit
        run: |
          pnpm audit --prod --audit-level=high
          pip-audit || true

  # ─────────────────────────────────────────────────────────────────────
  # Tier 4 — E2E + evals. Release gate + nightly. NOT a PR gate.
  # Triggered on push to main, on release, on schedule, and manually.
  # ─────────────────────────────────────────────────────────────────────
  e2e:
    name: Tier 4 · E2E + Evals
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Spin up full stack
        run: pnpm stack:up

      - name: E2E (record-and-replay)
        run: pnpm test:e2e -- --replay=fixtures

      - name: Evals (agent quality + cost budget)
        run: pnpm evals:run -- --budget=usd:50 --fail-on-regression=true

      - name: Teardown
        if: always()
        run: pnpm stack:down

      - name: Publish eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-report
          path: reports/evals/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # Nightly schedule. Runs Tier 4 + mutation testing on main.
  # ─────────────────────────────────────────────────────────────────────
  nightly:
    name: Nightly · Tier 4 + mutation
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'schedule'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tier 4 with live LLM (sampled)
        run: pnpm evals:run -- --live-llm --sample=0.05

      - name: Mutation testing on agent runtime
        run: pnpm test:mutate -- --packages=packages/orchestrator

  # ─────────────────────────────────────────────────────────────────────
  # Aggregator. The single required status check branch protection watches.
  # ─────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI · Required check
    runs-on: ubuntu-latest
    needs: [static, unit, integration]
    if: always()
    steps:
      - name: Verify all required tiers passed
        run: |
          if [ "${{ needs.static.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ]; then
            echo "One or more required CI tiers failed."
            exit 1
          fi
          echo "All required tiers green."

# Nightly schedule. Wired in the workflow file so branch protection and
# audit history are co-located with the PR-gated tiers.
# To enable, register the schedule in the GitHub UI or uncomment below
# once Actions billing / org policy is confirmed by the CTO.
#
# on.schedule:
#   - cron: '17 6 * * *'   # 06:17 UTC daily; off the :00 mark to avoid herd.
