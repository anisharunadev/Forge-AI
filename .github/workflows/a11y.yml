name: a11y

# M12 — Production Hardening (G5).
#
# Runs the WCAG AA Playwright spec across all 9 centers using
# `@axe-core/playwright`. Fails on any `critical` / `serious`
# violation.

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  a11y-centers:
    name: a11y-centers (axe-core WCAG AA)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install forge dependencies
        run: |
          cd apps/forge
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd apps/forge
          pnpm exec playwright install --with-deps chromium

      - name: Run a11y spec
        run: |
          cd apps/forge
          pnpm exec playwright test a11y-centers.spec.ts --reporter=line