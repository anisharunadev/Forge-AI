name: ci-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"

env:
  PYTHON_DEFAULT_VERSION: "3.13"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "0"

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/pyproject.toml

      - name: Install lint dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install ruff==0.7.4 mypy==1.13.0

      - name: ruff check
        working-directory: backend
        run: ruff check app tests

      - name: ruff format check
        working-directory: backend
        run: ruff format --check app tests

      - name: mypy
        working-directory: backend
        run: mypy app

  unit-tests:
    name: unit-tests (pytest + coverage)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: forge_test
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/forge_test
      REDIS_URL: redis://localhost:6379/0
      TESTING: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term \
            --cov-fail-under=70 \
            -m "not integration" \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.4.0
        with:
          files: backend/coverage.xml
          flags: backend-unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-tests:
    name: integration-tests (docker compose)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Bring up postgres + redis
        working-directory: backend
        run: |
          docker compose -f tests/docker-compose.test.yml up -d postgres redis
          # Wait for healthy
          for i in {1..30}; do
            if docker compose -f tests/docker-compose.test.yml ps | grep -q "(healthy)"; then
              echo "services healthy"
              break
            fi
            sleep 2
          done

      - name: Run integration pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://forge:forge@localhost:5432/forge_test
          REDIS_URL: redis://localhost:6379/0
          TESTING: "true"
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term \
            --cov-fail-under=70 \
            -m integration \
            -v

      - name: Tear down services
        if: always()
        working-directory: backend
        run: docker compose -f tests/docker-compose.test.yml down -v

      - name: Upload coverage
        uses: codecov/codecov-action@v5.4.0
        with:
          files: backend/coverage-integration.xml
          flags: backend-integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  openapi-validate:
    name: openapi-validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install openapi tools
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements.txt
          pip install prance==23.6.21.0 openapi-spec-validator==0.7.1

      - name: Generate openapi.json
        working-directory: backend
        run: |
          python -c "
          from app.main import app
          import json
          schema = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(schema, f, indent=2)
          "

      - name: Validate openapi.json
        working-directory: backend
        run: |
          python -c "
          from openapi_spec_validator import validate
          from prance import ResolvingParser
          parser = ResolvingParser('openapi.json', backend='openapi-spec-validator', strict=True)
          validate(parser.specification)
          print('openapi.json is valid')
          "

      - name: Check for breaking changes
        working-directory: backend
        run: |
          if [ -f openapi.json ]; then
            npx --yes @redocly/cli@1.27.2 lint openapi.json
          fi

      - name: Upload openapi artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 14

  security-scan:
    name: security-scan (bandit + safety + pip-audit)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install security tools
        working-directory: backend
        run: |
          python -m pip install --upgrade pip==24.2
          pip install bandit==1.7.10 safety==3.2.7 pip-audit==2.7.3

      - name: bandit
        working-directory: backend
        run: |
          bandit -r app -f json -o bandit-report.json
          bandit -r app -f txt

      - name: safety
        working-directory: backend
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          safety check --full-report --output json --save-json safety-report.json || true

      - name: pip-audit
        working-directory: backend
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true
          pip-audit -r requirements.txt

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: backend-security-reports
          path: |
            backend/bandit-report.json
            backend/safety-report.json
            backend/pip-audit-report.json
          retention-days: 30

  build-status:
    name: build-status
    runs-on: ubuntu-24.04
    needs: [lint, unit-tests, integration-tests, openapi-validate, security-scan]
    if: always()
    steps:
      - name: Report overall status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more backend CI jobs failed"
            exit 1
          fi
          echo "All backend CI jobs passed"
