name: dependency-audit

# Phase 8 SC-8.9 - zero high/critical CVEs in production dependencies.
# Runs pip-audit on the backend + pnpm audit on apps/forge. Surfaces
# findings; the operator decides whether to upgrade or document
# accepted risk in phase-8-signoff.md.

on:
  pull_request:
    paths:
      - 'backend/requirements*.txt'
      - 'backend/pyproject.toml'
      - 'apps/forge/package.json'
      - 'apps/forge/pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/audit-deps.sh'
      - '.github/workflows/deps.yml'
  push:
    branches: [main]
    paths:
      - 'backend/requirements*.txt'
      - 'backend/pyproject.toml'
      - 'apps/forge/package.json'
      - 'apps/forge/pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: deps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: pip-audit + pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Run audit
        run: bash scripts/audit-deps.sh
