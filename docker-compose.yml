name: forge-dev

# Forge AI v2.0 local development stack.
#
# Scope: developer laptop only. NOT production. Production lives in
# `infra/terraform/` and uses AWS managed services per ADR-001.
#
# v2.0 PRD stack (see implementation_plan.md):
#   - FastAPI (Python 3.13) on :8000  (backend)
#   - Next.js 15 on :3000             (apps/forge)
#   - PostgreSQL 17 + Apache AGE + pgvector on :5432  (ADR-002)
#   - Redis 7 on :6379
#   - Keycloak 26+ on :8080  (OIDC + SAML)
#   - LiteLLM Proxy on :4000 (DL-025: Provider Abstraction Layer)
#   - floci (S3-compatible local AWS emulator) on :4566
#     Drop-in LocalStack Community replacement (LocalStack Community
#     was sunset March 2026). Emulates 58 AWS services — S3, SQS, SNS,
#     Lambda, RDS, DynamoDB, Secrets Manager, etc. ADR-001: dev-only;
#     S3 (and other managed AWS services) in prod.
#
# ADR-001: cloud-only AWS in production — this compose exists solely
#          for local development and CI smoke.
# ADR-002: PostgreSQL 17 is the only database; Apache AGE provides
#          the property graph, pgvector provides vector search.
# DL-025 : LiteLLM Proxy is the sole LLM access path; downstream
#          code never calls provider SDKs directly.
#
# Usage:
#   cp .env.example .env       # edit secrets
#   ./scripts/setup-local.sh   # first-time bootstrap
#   docker compose up -d       # subsequent boots
#   docker compose down        # tear down (named volumes preserved)

services:
  postgres:
    # pgvector/pgvector:pg17 has pgvector pre-installed (postgres:17-alpine
    # does not, which breaks our knowledge graph / vector search). AGE
    # (Apache Graph Extension) is loaded at init time via scripts/postgres-init.
    image: pgvector/pgvector:pg17
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
      # UTF8 encoding is required so pgvector + AGE identifiers round-trip.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - forge-postgres-data:/var/lib/postgresql/data
      # Init scripts run once on a fresh volume; reruns are safe
      # because every statement is guarded with IF NOT EXISTS.
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge} -d ${POSTGRES_DB:-forge}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - forge-net

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - forge-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - forge-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.1
    container_name: forge-keycloak
    restart: unless-stopped
    # start-dev + --import-realm boots with the forge realm preloaded.
    # In production, Keycloak runs in `start` mode behind a managed
    # Postgres and is fronted by the identity-broker (see ADR-001).
    # step-53 Zone 1: infra/keycloak/realm-forge.json defines
    # the `forge` realm (clients: forge-ui public+PKCE, forge-backend
    # confidential) and the dev seed user arun@acme-corp.com with the
    # acme-corp tenant attributes attached.
    #
    # M1 T1.5: canonicalized on infra/keycloak/realm-forge.json (716 lines,
    # 7 forge-* realm roles, SAML, WebAuthn, IdP placeholders). The legacy
    # scripts/keycloak-init/forge-realm.json (146 lines, 3 roles) is now
    # archived under archive/keycloak-init-legacy/. See that README for
    # why this mount was changed.
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Confidential client secret read by realm-forge.json via the
      # ${FORGE_BACKEND_CLIENT_SECRET} placeholder. Keycloak resolves the
      # env var when the realm is imported on first boot.
      FORGE_BACKEND_CLIENT_SECRET: "${FORGE_BACKEND_CLIENT_SECRET:-${KEYCLOAK_BACKEND_SECRET:-forge-backend-dev-secret-change-in-prod}}"
      KEYCLOAK_BACKEND_SECRET: "${KEYCLOAK_BACKEND_SECRET:-forge-backend-dev-secret-change-in-prod}"
      # Optional dev IdP placeholders used by infra/keycloak/realm-forge.json.
      # The IdPs are disabled by default, but Keycloak still validates some
      # provider config fields during import, so unresolved ${...} strings can
      # fail startup before the server becomes healthy.
      FORGE_UI_URL: "${FORGE_UI_URL:-http://localhost:3000}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-disabled}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-disabled}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-disabled}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-disabled}"
      OKTA_ENTITY_ID: "${OKTA_ENTITY_ID:-http://localhost:8080/realms/forge}"
      OKTA_SSO_URL: "${OKTA_SSO_URL:-http://localhost:8080/realms/forge/broker/okta/endpoint}"
      OKTA_SLO_URL: "${OKTA_SLO_URL:-http://localhost:8080/realms/forge/broker/okta/endpoint}"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID:-disabled}"
      AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET:-disabled}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID:-common}"
      FORGE_SAML_ACS_URL: "${FORGE_SAML_ACS_URL:-http://localhost:8000/api/v1/auth/saml/acs}"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      # Auto-import directory — every *.json under this path is loaded
      # as a realm definition on first boot of a fresh Keycloak data
      # volume. Idempotent on subsequent boots (Keycloak skips realms
      # that already exist by name).
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # Keycloak container has no curl/wget, but the bundled `/bin/sh`
      # supports the bash /dev/tcp pseudo-device. The OIDC discovery
      # endpoint requires the master realm to be initialized, so a
      # successful response proves the server is fully ready.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - forge-net

  litellm:
    # DL-025: Provider Abstraction Layer. Every LLM call in the
    # backend targets http://litellm:4000 regardless of which
    # upstream provider actually serves the request.
    # Phase 7 SC-7.6 — pinned by digest (refresh quarterly).
    image: ghcr.io/berriai/litellm@sha256:aca3b6d31c55f421b2b7b2158b533583f8406036f7012f328c3b63a16cf2d21d
    container_name: forge-litellm
    restart: unless-stopped
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # LiteLLM uses its own database for spend tracking and rate
      # limits. We point it at the same Postgres instance for
      # simplicity; the database is created by postgres-init/03.
      # MUST use the docker-compose service name "postgres" — inside a
      # container, "localhost" refers to the container itself, not the
      # peer service on the bridge network.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@postgres:${POSTGRES_PORT:-5432}/litellm"
      REDIS_HOST: "redis"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      # DL-025 + infra/litellm/config.yaml:63 — the proxy refuses to
      # boot without this. Read from .env; falls back to the dev
      # placeholder so first-time `docker compose up` still works.
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-1234}"
      # step-65: when JWT auth is enabled, the proxy fetches the
      # signing public keys from this URL.  The backend mints the
      # proxy_token with its own RS256 keypair (see
      # app/core/oauth2_rsa.py) and exposes the public key as JWKS at
      # ``/api/v1/auth/jwks.json``.  We point the proxy at the
      # backend (the only signer in our network) rather than at
      # Keycloak — Keycloak doesn't issue tokens with the
      # ``aud="litellm-proxy"`` we set in our claims.
      JWT_PUBLIC_KEY_URL: "${JWT_PUBLIC_KEY_URL:-http://backend:8000/api/v1/auth/jwks.json}"
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:${LITELLM_PORT:-4000}/health/liveliness', timeout=3).status == 200 else 1)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - forge-net

  floci:
    # ADR-001: floci (LocalStack Community successor) emulates S3, SQS,
    # SNS, Lambda, RDS, DynamoDB, Secrets Manager, IAM, STS in dev. The
    # backend targets it via the standard AWS SDKs; in prod the same
    # SDKs target real AWS (see infra/terraform/). Floci accepts any
    # non-empty AWS credentials, so the test/test defaults in .env are
    # fine. The Docker socket is mounted so floci can spin up
    # Docker-backed services (Lambda, RDS emulation) when requested.
    # Phase 7 SC-7.6 — pinned by digest (refresh quarterly).
    image: floci/floci@sha256:0ac8aa799e6dbb4251a182b3263ed4c5846d8af0d69192d0f9f11ba4c9d8b984
    container_name: forge-floci
    restart: unless-stopped
    environment:
      FLOCI_PORT: "${FLOCI_PORT:-4566}"
      FLOCI_DEFAULT_REGION: "us-east-1"
      FLOCI_DEFAULT_ACCOUNT_ID: "000000000000"
      FLOCI_STORAGE_MODE: "persistent"
      FLOCI_STORAGE_PERSISTENT_PATH: "/data"
      FLOCI_HOSTNAME: "floci"
      SERVICES: "s3,sqs,sns,lambda,rds,secretsmanager,iam,sts,dynamodb"
      PERSISTENCE: "1"
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    volumes:
      - forge-floci-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/floci-init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - forge-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forge-backend
    restart: unless-stopped
    environment:
      # ADR-002: single Postgres for OLTP + graph + vectors.
      # The backend is async-native (sqlalchemy[asyncio] + asyncpg) — must
      # use the explicit asyncpg URL prefix or SQLAlchemy falls back to
      # psycopg2 (sync, not installed) at engine creation time.
      # MUST use the docker-compose service name "postgres" — inside the
      # backend container, "localhost" refers to the container itself.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD:-forge}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-forge}"
      REDIS_URL: "redis://redis:${REDIS_PORT:-6379}/0"
      # OIDC: backend validates tokens issued by the local Keycloak
      # realm. Issuer URL must match what Keycloak prints on
      # startup (no trailing slash).
      KEYCLOAK_URL: "http://keycloak:${KEYCLOAK_PORT:-8080}"
      KEYCLOAK_REALM: "forge"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars-long}"
      # DL-025: backend never talks to provider SDKs directly.
      LITELLM_PROXY_URL: "http://litellm:${LITELLM_PORT:-4000}"
      LITELLM_API_KEY: "${LITELLM_MASTER_KEY:-sk-1234}"
      # F-829 admin key — defaults to the same value as the chat key
      # so a fresh `docker compose up` boots without manual env wiring.
      # In production, set LITELLM_ADMIN_KEY explicitly to a long-lived
      # distinct value (see .env.example for the convention).
      LITELLM_ADMIN_KEY: "${LITELLM_ADMIN_KEY:-${LITELLM_MASTER_KEY:-sk-1234}}"
      # ADR-001: S3-compatible object storage.
      FLOCI_URL: "http://floci:4566"
      FLOCI_PUBLIC_URL: "${FLOCI_PUBLIC_URL:-http://localhost:4566}"
      AWS_ENDPOINT_URL: "http://floci:4566"
      S3_BUCKET_ARTIFACTS: "${S3_BUCKET_ARTIFACTS:-forge-artifacts}"
      S3_BUCKET_TERMINAL_EXPORTS: "${S3_BUCKET_TERMINAL_EXPORTS:-forge-terminal-exports}"
      S3_BUCKET_DOCS: "${S3_BUCKET_DOCS:-forge-docs}"
      ENV: "development"
      # M2 T-A6 — PITFALL-5 closure.  When the otel-collector service
      # is running (see infra/observability/otel-collector-config.yaml)
      # the backend exports spans + metrics to it.  When unset the
      # backend falls back to the no-op exporter (see telemetry.py)
      # so a fresh ``docker compose up`` boots without the collector
      # being live — the ``/healthz`` otel_exporter_configured probe
      # reports ``ok`` once the env var resolves to a usable endpoint.
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      # M1 G10 — wait for litellm /health/liveliness before starting the
      # backend. ``service_started`` only proves the container PID
      # exists; the proxy is unable to serve /chat/completions for the
      # first few seconds while it warms its model registry. Switching
      # to ``service_healthy`` (litellm service declares its own
      # healthcheck that hits /health/liveliness every 10s) means the
      # backend only starts when the proxy can actually answer a
      # request, eliminating the F-829a cold-start race that previously
      # manifested as intermittent 503s on the first /copilot call.
      litellm:
        condition: service_healthy
      floci:
        condition: service_started
    # M1 G14 — backend healthcheck reads the new top-level /healthz
    # (added by T1.3) which runs all 7 probes (db_health,
    # redis_health, keycloak_reachable, litellm_health, audit_sink,
    # floci_health, forge_phase4_mounted). 10s interval matches the
    # litellm healthcheck cadence so compose catches backend regression
    # on roughly the same wall-clock cycle.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - forge-net

  forge-ui:
    build:
      context: .
      dockerfile: apps/forge/Dockerfile.dev
    container_name: forge-ui
    restart: unless-stopped
    environment:
      FORGE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8000}/api/v1"
      FORGE_WS_BASE_URL: "ws://localhost:${BACKEND_PORT:-8000}/ws"
      KEYCLOAK_URL: "http://localhost:${KEYCLOAK_PORT:-8080}"
      NODE_ENV: "development"
    ports:
      - "${FORGE_UI_PORT:-3000}:3000"
    depends_on:
      - backend
    # M1 G15 — frontend healthcheck. Next.js dev server returns 200 on
    # any matched route, so we hit ``/`` (the shell always renders).
    # 15s interval: slower than backend because the page recompiles
    # hot-reloaded source and may briefly serve stale HTML during the
    # recompile; we don't want a transient 500 to flip the container
    # unhealthy while Next is mid-build.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000/', timeout=3).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    # F-829 fix: the production Dockerfile (apps/forge/Dockerfile) only
    # copies .next/, public/, package.json, next.config.mjs, and
    # node_modules/ to the runner stage — NOT the app/ source directory.
    # With NODE_ENV=development that image triggers `next dev`, which
    # needs the source tree and fails with "Couldn't find any pages or
    # app directory". Switch to Dockerfile.dev (which runs `pnpm run dev`)
    # and bind-mount the source so HMR + fast refresh work.
    volumes:
      - ./apps/forge:/app/apps/forge
      - ./apps/forge/app:/app/apps/forge/app
      - ./apps/forge/components:/app/apps/forge/components
      - ./apps/forge/lib:/app/apps/forge/lib
      - ./apps/forge/hooks:/app/apps/forge/hooks
      - ./apps/forge/public:/app/apps/forge/public
      - ./apps/forge/tests:/app/apps/forge/tests
      - ./apps/forge/next.config.mjs:/app/apps/forge/next.config.mjs
      - ./apps/forge/tsconfig.json:/app/apps/forge/tsconfig.json
      - ./apps/forge/components.json:/app/apps/forge/components.json
    networks:
      - forge-net

  docs-site:
    # Astro.js 5 + Starlight docs site. The Dockerfile is at
    # docs-site/Dockerfile and produces a Node 20-alpine image that
    # serves the prebuilt static output via `astro preview` on :4321.
    # Astro static output needs no runtime backend; the `depends_on`
    # is informational so docs is started after the API for a
    # nicer boot order.
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    container_name: forge-docs
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4321"
    ports:
      - "${DOCS_SITE_PORT:-4321}:4321"
    depends_on:
      - backend
    # M1 G16 — docs-site healthcheck. Astro preview serves the static
    # /index.html at /. 30s interval is fine because the docs are a
    # static surface; we only care that the container is up.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4321/', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - forge-net

volumes:
  forge-postgres-data:
    name: forge-postgres-data
  forge-redis-data:
    name: forge-redis-data
  forge-floci-data:
    name: forge-floci-data

networks:
  forge-net:
    name: forge-net
    driver: bridge
