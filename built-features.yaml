# Built Features manifest
# Single source of truth for the Built Features table in `.claude/CLAUDE.md`
# AND the docs coverage check.
#
# Run `./scripts/generate-built-features.sh` to regenerate the table.
# Run `./scripts/check-feature-docs.sh`         to verify docs coverage.
#
# Schema:
#   area:    Workspace | Centers | Lifecycle | Infra | Integration
#   order:   int, sort key within area
#   feature: short name (1–6 words)
#   steps:   list of step numbers / refs (e.g. ["18 v2", "26", "42"])
#   status:  Production | Beta | Alpha | Planned | Wired <date>
#   docs:    OPTIONAL — path relative to docs-site/src/content/docs/
#            (without `.md`). Required for any non-Planned status.
#            Set to `null` only for self-referential entries (e.g. the
#            Documentation site row in Infra).
#
# Keep entries sorted by `order` within each area for stable diffs.

