# infra/litellm/config.yaml — Forge AI v2.0 with LiteLLM guardrails
#
# DL-025: Provider Abstraction Layer. The backend talks ONLY to
# http://litellm:4000; this file picks the upstream providers,
# sets spend / rate limits, and exposes the model catalog that the
# orchestrator enumerates.
#
# Guardrails are declared here as the source of truth. Per-key or
# per-team overrides go through the admin API.
#
# ============================================================================
# M1 G13 — guardrail activation deferred to M2 cost-admission work.
#
# The four guardrails below (pii_masking, prompt_injection_detection,
# content_moderation, secret_detection) are declared with
# ``callbacks: []`` and ``default_on: false``. That makes them
# explicit no-ops at the proxy level — the proxy boots, every
# guardrail name is registered, and no per-request rewrite happens.
#
# This is intentional for M1: we want the proxy to start cleanly
# with the placeholder keys from .env.example (the M1 G2 env
# validator now refuses to boot on those unless
# ``ALLOW_PLACEHOLDER_LLM_KEYS=true``), and we want the model
# catalog to enumerate so /api/v1/forge/models can list it. The
# real callbacks (presidio, lakera_prompt_injection, hide_secrets,
# etc.) require additional infra, billing, and per-tenant policy
# decisions that are owned by M2 cost-admission work.
#
# To activate any guardrail: populate ``callbacks`` with the real
# callback names per the LiteLLM docs, set ``default_on: true``,
# and add the matching per-call ``guardrail`` block to the backend
# chat path. Track this with a single PR once M2 lands; do NOT
# surface the activation flag through environment variables (Rule
# 8 — configurable everything, but flip should go through code
# review, not env wiring).
# ============================================================================


model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-3-5-haiku
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
      dimensions: 1536
  - model_name: text-embedding-3-large
    litellm_params:
      model: openai/text-embedding-3-large
      api_key: os.environ/OPENAI_API_KEY
      dimensions: 3072

router_settings:
  num_retries: 3
  timeout: 60
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  database_url: os.environ/DATABASE_URL

  # Apply guardrails globally to all requests.
  # LiteLLM requires each entry to be a single-key dict with `callbacks`
  # (a list of real callback names), not a bare string. With `callbacks: []`
  # and `default_on: false` the proxy boots and the guardrail is a no-op
  # — flip `default_on` to true and add real callbacks (e.g. "presidio",
  # "lakera_prompt_injection", "hide_secrets") to activate it.
  guardrails:
    - pii_masking:
        callbacks: []
        default_on: false
    - prompt_injection_detection:
        callbacks: []
        default_on: false
    - content_moderation:
        callbacks: []
        default_on: false
    - secret_detection:
        callbacks: []
        default_on: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_type: "postgres"

  # step-65: enable JWT-auth so the proxy trusts our RS256 proxy_token
  # instead of (or in addition to) the per-tenant Virtual Keys issued
  # by VirtualKeyManager.  The proxy JWKS URL points at the local
  # Keycloak realm; users who don't have a pre-provisioned Virtual
  # Key still authenticate, get a team_id from `tenant_id`, and have
  # their model access governed by `role_mappings` below.
  enable_jwt_auth: True
  jwt_public_key_url: os.environ/JWT_PUBLIC_KEY_URL
  litellm_jwtauth:
    user_id_jwt_field: "sub"           # -> LiteLLM user_id (principal)
    team_id_jwt_field: "tenant_id"     # -> LiteLLM team (per-tenant budget)
    user_email_jwt_field: "email"
    user_id_upsert: True               # auto-create LiteLLM user on first auth
    enforce_rbac: True
    role_mappings:
      - role: internal_user
        internal_role: internal_user
      - role: proxy_admin
        internal_role: proxy_admin
    admin_jwt_scope: "forge:admin"
