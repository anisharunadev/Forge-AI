apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reference-service.fullname" . }}-secrets
  labels:
    {{- include "reference-service.labels" . | nindent 4 }}
  annotations:
    # Pointer to the AWS Secrets Manager secret. The IRSA-issued IAM role
    # is the only path that resolves it (no inlined literals). §4.5.
    secrets-manager/reference-service-secrets: {{ .Values.secrets.secretArn | quote }}
type: Opaque
# No data: — secrets are read by the SDK via the secrets-manager CSI driver
# or by the IRSA-issued SDK session. Putting them in a Kubernetes Secret
# would duplicate the surface and violate the single-source-of-truth rule.
