apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "reference-service.serviceAccountName" . }}
  labels:
    {{- include "reference-service.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# IRSA annotation — populated from Terraform output (values-*.yaml overlay).
# The ARN comes from infra/terraform/reference-service/outputs.tf#iam_role_arn.
# §4.2 — OIDC only, no static AWS keys.
{{- if .Values.serviceAccount.irsaRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.irsaRoleArn | quote }}
{{- end }}
automountServiceAccountToken: true
