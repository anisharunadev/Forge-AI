apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reference-service.fullname" . }}-config
  labels:
    {{- include "reference-service.labels" . | nindent 4 }}
data:
  # Non-secret config only. Secrets go in the Secret manifest.
  NODE_ENV: production
  PORT: {{ .Values.service.targetPort | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
