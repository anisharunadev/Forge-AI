// ============================================================================
// orchestrator.proto — Master Orchestrator gRPC seam
// ============================================================================
//
// Source of truth for the wire format between the Master Orchestrator and
// the Agent Runtime. Per ADR-0007 (accepted 2026-06-17, CTO sign-off), the
// IDL is the contract and the generated stubs are committed per repo.
//
// **First-pass CTO module** (FORA-135). The greenfield monorepo split called
// out in FORA-50 spec §2.0 lands in a follow-up sub-task; this proto file
// is the v1.0.0 contract the future monorepo inherits. Generated TypeScript
// + Python stubs are NOT committed in this first-pass — the engine
// consumes the typed shapes directly from `./types.ts` and the gRPC server
// adapter (future sub-task) will codegen + commit them.
//
// Comments reference FORA-50 spec §2.3 / §4.2 / §5.1, ADR-0007 §3 / §6 / §7.
// ============================================================================

syntax = "proto3";
package fora.orchestrator.v1;

import "google/protobuf/timestamp.proto";

// ----------------------------------------------------------------------------
// Run context — the single seam between Orchestrator and Agent Runtime
// (ADR-0007 §3). Returned by GetRunContext.
// ----------------------------------------------------------------------------

message RunContext {
  string run_id = 1;
  string tenant_id = 2;        // from JWT (ADR-0003)
  string stage = 3;            // ideation | architect | dev | qa | security | devops | docs
  string status = 4;           // pending | running | waiting_approval | approved | rejected | returned | skipped
  google.protobuf.Timestamp started_at = 5;
  repeated ArtefactRef inputs = 6;       // typed pointers (ADR, PR, report)
  map<string, string> labels = 7;        // for ad-hoc annotation
  string idempotency_key = 8;            // echoed on every retry
}

message ArtefactRef {
  string kind = 1;             // adr | pr | report | page | jira
  string url = 2;
  string sha256 = 3;           // hex, 64 chars
}

// ----------------------------------------------------------------------------
// AdvanceStage — the stage transition engine entry point (ADR-0007 §3, FORA-50 §2.3).
// ----------------------------------------------------------------------------

message AdvanceStageRequest {
  string run_id = 1;
  string from_stage = 2;
  string to_stage = 3;
  Decision decision = 4;
  ArtefactRef artefact = 5;
  string idempotency_key = 6;
}

message Decision {
  enum Kind { NEXT = 0; ABORT = 1; RETURN = 2; }
  Kind kind = 1;
  string reason = 2;           // required for ABORT and RETURN
  string returned_to_stage = 3; // required when kind = RETURN
}

message StageDecision {
  string run_id = 1;
  string current_stage = 2;
  string status = 3;           // running | waiting_approval | finished | done
  repeated string event_ids = 4;
}

// ----------------------------------------------------------------------------
// CreateRun (ADR-0007 §3).
// ----------------------------------------------------------------------------

message CreateRunRequest {
  string tenant_id = 1;        // from JWT, not from caller
  string goal_id = 2;
  string project_id = 3;
  Trigger trigger = 4;
  string idempotency_key = 5;
}

message Trigger {
  enum Kind { USER = 0; SLACK = 1; EMAIL = 2; SCHEDULE = 3; WEBHOOK = 4; }
  Kind kind = 1;
  string actor = 2;            // user id, channel, address, etc.
  string payload_ref = 3;      // pointer to the trigger payload
}

message Run {
  string run_id = 1;
  string tenant_id = 2;
  string status = 3;
  string current_stage = 4;
  google.protobuf.Timestamp created_at = 5;
}

// ----------------------------------------------------------------------------
// Cost / health / context (ADR-0007 §3).
// ----------------------------------------------------------------------------

message RunContextRequest {
  string run_id = 1;
  string stage = 2;            // which stage's context to fetch
}

message ReportCostRequest {
  string run_id = 1;
  string stage = 2;
  int64 tokens_in = 3;
  int64 tokens_out = 4;
  string currency = 5;         // ISO 4217, default "USD"
  Money cost = 6;
  string idempotency_key = 7;
}

message Money {
  int64 units = 1;             // dollars
  int64 nanos = 2;             // 1e-9 dollars
}

message Ack {
  bool ok = 1;
  string event_id = 2;         // cost_reported event id, on success
}

message HealthCheckRequest {}
message HealthCheckResponse {
  enum State { SERVING = 0; DEGRADED = 1; NOT_SERVING = 2; }
  State state = 1;
  string version = 2;
  map<string, string> deps = 3; // name → "ok" | "down" | "degraded"
}

// ----------------------------------------------------------------------------
// Service definition (ADR-0007 §3).
// ----------------------------------------------------------------------------
//
//   SLA per ADR-0007 §7:
//     AdvanceStage   p50 < 200ms   p99 < 1s
//     CreateRun      p50 < 200ms   p99 < 1s
//     GetRunContext  p50 < 50ms    p99 < 200ms
//     ReportCost     p50 < 100ms   p99 < 500ms
//     HealthCheck    p50 < 20ms    p99 < 100ms
//
//   Failure modes per ADR-0007 §8:
//     Orchestrator down    → DEADLINE_EXCEEDED; agent retries
//     Auth broker down     → UNAUTHENTICATED; run cannot start
//     DB write fails       → INTERNAL; agent retries with same Idempotency-Key
//     NATS publish fails   → background retry; error event; run continues
//     Stage agent crash    → DEADLINE_EXCEEDED; run stays running
// ----------------------------------------------------------------------------

service Orchestrator {
  rpc CreateRun(CreateRunRequest) returns (Run);
  rpc AdvanceStage(AdvanceStageRequest) returns (StageDecision);
  rpc GetRunContext(RunContextRequest) returns (RunContext);
  rpc ReportCost(ReportCostRequest) returns (Ack);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}