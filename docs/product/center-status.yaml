# Center status — M15-2 source of truth for "what is finished?"
#
# Each center page that lives under apps/forge/app/<route>/page.tsx is
# scored against the M15-2 10-point Definition of Done. The score is the
# arithmetic mean of the 10 verdicts below.
#
# A center is **DONE** when its top-3 routes score 10/10.
# Until then, no new work on that center (Rec #6 from the audit).
#
# Schema per entry:
#   route:           path under apps/forge/app (no trailing /page.tsx)
#   center:          Center name — must match the Legacy nav IA
#   component:       primary component file (NOT verified at runtime)
#   backend:         primary backend route (file:func) — used for R6 audit check
#   hook:            primary frontend hook file:line
#   test:            primary happy-path test
#
# The 10 verdicts below are filled in by the gate (`./scripts/check-page-dod.sh`)
# for 9 of 10 automated checks (real_api, loading, error, audit, coverage,
# analytics, responsive, permission, a11y); the only manual gate remaining
# is empty_state (heuristic too false-positive-prone). For the `permission`
# check, the gate verifies the frontend threads `tenant_id` (RBAC enforcement
# itself lives in the backend's `require_permission()` decorator).
#
# Verdicts:
#   pass          — automated check sees the required signal
#   fail          — automated check sees a missing/forbidden signal
#   unchecked     — manual gate (5/8/9); not yet reviewed
#   checked       — manual gate signed off by reviewer
#
# Last verified: 2026-07-07 (M15-7 refresh — auto-checks expanded; 80% threshold cleared on both hero pages; remaining gaps are `permission` + `analytics`.)

version: 1

centers:

  - center: Ideation
    top_routes:
      - route: ideation
        component: apps/forge/app/ideation/page.tsx
        backend: backend/app/api/v1/ideation/ideas.py:create_idea
        hook: apps/forge/lib/hooks/useIdeation.ts:328
        test: backend/tests/services/test_ideation_e2e_chain.py
        verdicts:                # 2026-07-07 — M15-8 refresh (10/10)
          real_api:        pass   # M15-1 closed mocks
          loading:         pass   # apps/forge/app/ideation/loading.tsx
          error:           pass   # bubbles to apps/forge/app/error.tsx
          empty_state:     pass   # <EmptyState> used in tabs; manual sign-off retained
          permission:      pass   # @/lib/api hook import threads tenant via api client
          audit:           pass   # @audit(action="ideation.idea.create", ...)
          analytics:       pass   # track('prd.generated') on Generate CTA
          a11y:            pass   # aria- attributes detected
          responsive:      pass   # sm:/md: Tailwind breakpoints present
          coverage:        pass   # backend + e2e exist
        dod_score: null  # computed by gate

  - center: Architecture
    top_routes:
      - route: architecture
        component: apps/forge/app/architecture/page.tsx
        backend: backend/app/api/v1/architecture/adrs.py:create_adr
        hook: apps/forge/lib/hooks/useArchitecture.ts:226
        test: backend/tests/test_golden_workflow.py
        verdicts:                # 2026-07-07 — M15-8 refresh (10/10)
          real_api:        pass   # hero pages wired to real hooks (M15-1 Gaps 1-3)
          loading:         pass   # apps/forge/app/architecture/loading.tsx
          error:           pass   # bubbles to apps/forge/app/error.tsx
          empty_state:     pass   # reviewer panels + task trees have empty states
          permission:      pass   # @/lib/hooks/useArchitecture threads tenant via api client
          audit:           pass   # @audit(action="architecture.approval.*") + R6 fix
          analytics:       pass   # track('approval.requested') on Request review CTA
          a11y:            pass   # aria- attributes detected
          responsive:      pass   # sm:/md: Tailwind breakpoints present
          coverage:        pass   # test_golden_workflow.py + approval tests
        dod_score: null

# Center-completion rule (Rec #6):
#   A center is DONE when ≥ 3 of its top_routes score 10/10.
#   Until then, the gate flags any PR that adds new work to that center.
#
# Computed summary: see scripts/check-page-dod.sh report output.
